<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-2xl p-6 w-full max-w-md">
            <div class="text-center mb-8">
                <i class="fas fa-lock text-5xl text-purple-600 mb-4"></i>
                <h1 class="text-3xl font-bold text-gray-800">Admin Panel</h1>
                <p class="text-gray-600 mt-2">Enter your credentials to continue</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Username</label>
                    <input type="text" id="loginUsername" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none transition"
                        placeholder="Enter username">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" id="loginPassword" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none transition"
                        placeholder="Enter password">
                </div>

                <div id="loginError" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-3 rounded">
                    <p id="loginErrorMsg"></p>
                </div>

                <button type="submit"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>

            <!-- <p class="text-center text-gray-600 text-sm mt-4">
                <strong>Demo Credentials:</strong><br>
                Username: <code class="bg-gray-100 px-2 py-1 rounded">admin</code><br>
                Password: <code class="bg-gray-100 px-2 py-1 rounded">admin123</code>
            </p> -->
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">Contact Management</h1>
                    <p class="text-gray-200 text-sm md:text-base">Manage all contact messages from your portfolio</p>
                </div>
                <div class="flex flex-col gap-3 items-center md:items-end w-full md:w-auto">
                    <form id="photoForm" class="flex gap-2 items-center bg-white px-3 py-2 rounded-lg shadow-md w-full md:w-auto">
                        <input type="file" id="photoInput" accept="image/*" required
                            class="flex-1 px-2 py-1 text-xs border border-gray-300 rounded focus:border-purple-500 focus:outline-none">
                        <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs whitespace-nowrap transition duration-200">
                            <i class="fas fa-image mr-1"></i>Upload Photo
                        </button>
                    </form>
                    <form id="cvForm" class="flex gap-2 items-center bg-white px-3 py-2 rounded-lg shadow-md w-full md:w-auto">
                        <input type="file" id="cvInput" accept=".pdf,.doc,.docx" required
                            class="flex-1 px-2 py-1 text-xs border border-gray-300 rounded focus:border-purple-500 focus:outline-none">
                        <button type="submit"
                            class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs whitespace-nowrap transition duration-200">
                            <i class="fas fa-upload mr-1"></i>Upload CV
                        </button>
                    </form>
                    <button onclick="logout()"
                        class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition duration-200 w-full md:w-auto">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-4 md:p-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-list mr-2"></i>All Contacts
                    </h2>
                    <button onclick="loadContacts()"
                        class="w-full md:w-auto bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition duration-200">
                        <i class="fas fa-sync mr-2"></i>Refresh
                    </button>
                </div>

                <div class="mb-4 p-3 bg-blue-50 border-l-4 border-blue-500 rounded">
                    <p class="text-blue-800 text-sm md:text-base">
                        Total Contacts: <span id="contactCount" class="font-bold">0</span>
                    </p>
                </div>

                <div class="overflow-x-auto hidden md:block">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-100 border-b-2 border-gray-300">
                            <tr>
                                <th class="px-4 py-3 font-bold text-gray-700">ID</th>
                                <th class="px-4 py-3 font-bold text-gray-700">Name</th>
                                <th class="px-4 py-3 font-bold text-gray-700">Email</th>
                                <th class="px-4 py-3 font-bold text-gray-700">Message</th>
                                <th class="px-4 py-3 font-bold text-gray-700">Time</th>
                                <th class="px-4 py-3 font-bold text-gray-700">Action</th>
                            </tr>
                        </thead>
                        <tbody id="contactsTableBody">
                            <tr>
                                <td colspan="6" class="px-4 py-8 text-center text-gray-500">
                                    <i class="fas fa-spinner fa-spin mr-2"></i>Loading contacts...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="contactsCardsContainer" class="md:hidden space-y-4">
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-spinner fa-spin mr-2"></i>Loading contacts...
                    </div>
                </div>

                <div id="emptyState" class="hidden text-center py-8">
                    <i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500 text-lg">No contacts found</p>
                </div>
            </div>
        </div>
    </div>

    <div id="replyModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Reply to Contact</h2>
            
            <div class="mb-4 p-3 bg-gray-50 rounded">
                <p class="text-sm text-gray-600"><strong>From:</strong> <span id="replyEmail"></span></p>
                <p class="text-sm text-gray-600"><strong>Name:</strong> <span id="replyName"></span></p>
            </div>

            <form id="replyForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Your Reply</label>
                    <textarea id="replyMessage" required
                        class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none h-32 resize-none"
                        placeholder="Type your reply..."></textarea>
                </div>
                
                <div class="flex gap-3 justify-end">
                    <button type="button" onclick="closeReplyModal()"
                        class="px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg transition duration-200">
                        Cancel
                    </button>
                    <button type="submit"
                        class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition duration-200">
                        <i class="fas fa-paper-plane mr-2"></i>Send Reply
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        let currentContactId = null;

        async function loadContacts() {
            try {
                const response = await fetch(`${API_URL}/show_contacts`);
                const contacts = await response.json();
                
                const tableBody = document.getElementById('contactsTableBody');
                const cardsContainer = document.getElementById('contactsCardsContainer');
                const emptyState = document.getElementById('emptyState');
                const contactCount = document.getElementById('contactCount');

                if (contacts.length === 0) {
                    tableBody.innerHTML = '';
                    cardsContainer.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    contactCount.textContent = '0';
                    return;
                }

                emptyState.classList.add('hidden');
                contactCount.textContent = contacts.length;

                tableBody.innerHTML = contacts.map(contact => `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="px-4 py-3 font-semibold text-gray-700">${contact.id}</td>
                        <td class="px-4 py-3 text-gray-700">${contact.name}</td>
                        <td class="px-4 py-3 text-gray-700">${contact.email}</td>
                        <td class="px-4 py-3 text-gray-700 max-w-xs truncate">${contact.message}</td>
                        <td class="px-4 py-3 text-gray-600 text-sm">
                            ${new Date(contact.timestamp).toLocaleString()}
                        </td>
                        <td class="px-4 py-3 space-x-2">
                            <button onclick="openReplyModal(${contact.id}, '${contact.email}', '${contact.name}')"
                                class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded transition duration-200">
                                <i class="fas fa-reply mr-1"></i>Reply
                            </button>
                            <button onclick="deleteContact(${contact.id})"
                                class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded transition duration-200">
                                <i class="fas fa-trash mr-1"></i>Delete
                            </button>
                        </td>
                    </tr>
                `).join('');

                cardsContainer.innerHTML = contacts.map(contact => `
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
                        <div class="mb-3">
                            <p class="text-sm text-gray-600"><strong>ID:</strong> ${contact.id}</p>
                            <p class="text-sm text-gray-600"><strong>Name:</strong> ${contact.name}</p>
                            <p class="text-sm text-gray-600"><strong>Email:</strong> ${contact.email}</p>
                        </div>
                        <div class="mb-3">
                            <p class="text-sm text-gray-600"><strong>Message:</strong></p>
                            <p class="text-gray-700 text-sm mt-1">${contact.message}</p>
                        </div>
                        <p class="text-xs text-gray-500 mb-3">
                            ${new Date(contact.timestamp).toLocaleString()}
                        </p>
                        <div class="flex gap-2">
                            <button onclick="openReplyModal(${contact.id}, '${contact.email}', '${contact.name}')"
                                class="flex-1 bg-green-500 hover:bg-green-600 text-white px-3 py-2 rounded transition duration-200 text-sm">
                                <i class="fas fa-reply mr-1"></i>Reply
                            </button>
                            <button onclick="deleteContact(${contact.id})"
                                class="flex-1 bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded transition duration-200 text-sm">
                                <i class="fas fa-trash mr-1"></i>Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading contacts:', error);
                alert('Error loading contacts. Make sure the API is running.');
            }
        }

        function openReplyModal(contactId, email, name) {
            currentContactId = contactId;
            document.getElementById('replyEmail').textContent = email;
            document.getElementById('replyName').textContent = name;
            document.getElementById('replyMessage').value = '';
            document.getElementById('replyModal').classList.remove('hidden');
        }

        function closeReplyModal() {
            document.getElementById('replyModal').classList.add('hidden');
            currentContactId = null;
        }

        document.getElementById('replyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = document.getElementById('replyMessage').value;
            const email = document.getElementById('replyEmail').textContent;

            alert(`Reply sent to ${email}:\n\n${message}`);
            closeReplyModal();
            
            // In a real application, you would send this to your backend
            // For now, just show a success message
        });

        async function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this contact?')) return;

            try {
                const response = await fetch(`${API_URL}/delete_contacts/${id}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.status === 'success' || data.id) {
                    alert('Contact deleted successfully!');
                    loadContacts();
                } else {
                    alert(data.message || 'Error deleting contact');
                }
            } catch (error) {
                console.error('Error deleting contact:', error);
                alert('Error deleting contact');
            }
        }

        document.getElementById('replyModal').addEventListener('click', (e) => {
            if (e.target.id === 'replyModal') {
                closeReplyModal();
            }
        });

        document.getElementById('photoForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('photoInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a photo');
                return;
            }

            if (!file.type.startsWith('image/')) {
                alert('Please select a valid image file');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('Image size must be less than 5MB');
                return;
            }

            const formData = new FormData();
            formData.append('photo', file);

            try {
                const response = await fetch(`${API_URL}/upload_photo`, {
                    method: 'POST',
                    body: formData,
                });
                const result = await response.json();

                if (result.status !== 'success') {
                    alert(result.message || 'Photo upload failed');
                    return;
                }

                alert('Photo uploaded successfully!');
                document.getElementById('photoForm').reset();
            } catch (error) {
                console.error('Error uploading photo:', error);
                alert('Error uploading photo. Make sure the backend is running.');
            }
        });

        document.getElementById('cvForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('cvInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a CV file');
                return;
            }

            const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
            if (!validTypes.includes(file.type)) {
                alert('Please select a valid CV file (PDF, DOC, or DOCX)');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                alert('CV file size must be less than 10MB');
                return;
            }

            const formData = new FormData();
            formData.append('cv', file);

            try {
                const response = await fetch(`${API_URL}/upload_cv`, {
                    method: 'POST',
                    body: formData,
                });
                const result = await response.json();

                if (result.status !== 'success') {
                    alert(result.message || 'CV upload failed');
                    return;
                }

                alert('CV uploaded successfully!');
                document.getElementById('cvForm').reset();
            } catch (error) {
                console.error('Error uploading CV:', error);
                alert('Error uploading CV. Make sure the backend is running.');
            }
        });

        function loadSavedFiles() {
            // Placeholder - no longer needed for admin panel
        }

        
        const VALID_CREDENTIALS = {
            username: 'Brajesh',
            password: 'brajesh'
        };

        function checkAuthentication() {
            const isAuthenticated = localStorage.getItem('contactPanelAuth') === 'true';
            if (isAuthenticated) {
                showMainContent();
                loadContacts();
                loadSavedFiles();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const errorMsg = document.getElementById('loginErrorMsg');

            if (username === VALID_CREDENTIALS.username && password === VALID_CREDENTIALS.password) {
                localStorage.setItem('contactPanelAuth', 'true');
                errorDiv.classList.add('hidden');
                showMainContent();
                loadContacts();
                loadSavedFiles();
            } else {
                errorMsg.textContent = 'Invalid username or password!';
                errorDiv.classList.remove('hidden');
                document.getElementById('loginPassword').value = '';
            }
        });

        function showMainContent() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('contactPanelAuth');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('loginForm').reset();
            }
        }

        window.addEventListener('load', () => {
            checkAuthentication();
        });
    </script>
</body>
</html>
